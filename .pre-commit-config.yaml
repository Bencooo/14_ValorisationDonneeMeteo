repos:
  - repo: local
    hooks:
      - id: backend-pre-commit
        name: Run backend pre-commit hooks
        entry: bash -c 'cd backend && uv run pre-commit run --all-files --config=.pre-commit-config.yaml'
        language: system
        pass_filenames: false
        always_run: true
        stages: [ pre-commit, pre-push, manual ]
        verbose: true
  - repo: local
    hooks:
      - id: frontend-pre-commit
        name: Run frontend pre-commit hooks
        # Pas de lint:fix/format --write ici : en CI ça modifie le working tree et fait échouer pre-commit.
        # En local : npm run check (fix + format) avant de committer.
        entry: bash -c 'cd frontend && npm run format:check && npm run lint && npm run test:unit'
        language: system
        pass_filenames: false
        always_run: true
        stages: [ pre-commit, pre-push, manual ]
        verbose: true
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [ --fix=lf ]
      - id: trailing-whitespace
        args: [ --markdown-linebreak-ext=md ]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
