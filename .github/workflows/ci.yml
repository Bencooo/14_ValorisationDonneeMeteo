name: Basic CI/CD Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  install-dependencies:
    name: Install dependencies
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.0"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --extra dev --locked

  run-tests:
    name: Run tests
    runs-on: ubuntu-24.04
    needs: install-dependencies
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start TimescaleDB (same stack as dev)
        working-directory: backend/timescaledb-env
        run: docker compose up -d timescaledb --wait

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run frontend tests
        working-directory: frontend
        run: |
          set -o pipefail
          mkdir -p ../reports/tests
          npm run test:ci 2>&1 | tee ../reports/tests/frontend-tests.txt

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.0"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --extra dev --locked

      - name: Prepare backend environment
        working-directory: backend
        run: cp .env.example .env

      - name: Run backend tests
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: meteodb
          DB_USER: infoclimat
          DB_PASSWORD: infoclimat2026
        run: |
          set -o pipefail
          mkdir -p ../reports/tests
          uv run pytest 2>&1 | tee ../reports/tests/backend-tests.txt

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/tests/

  run-linter:
    name: Run linter
    runs-on: ubuntu-24.04
    needs: install-dependencies
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.0"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --extra dev --locked

      - name: Lint backend
        working-directory: backend
        run: uv run ruff check .

  run-security-scan:
    name: Run security scan
    runs-on: ubuntu-24.04
    needs: install-dependencies
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run npm audit
        run: |
          mkdir -p reports/security
          cd frontend
          npm audit --json > ../reports/security/npm-audit.json || true

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.0"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --extra dev --locked

      - name: Run pip-audit
        run: |
          python -m pip install pip-audit
          mkdir -p reports/security
          cd backend
          uv export --format requirements-txt > /tmp/backend-requirements.txt
          pip-audit -r /tmp/backend-requirements.txt -f json > ../reports/security/pip-audit.json || true

      - name: Upload security scan report
        uses: actions/upload-artifact@v4
        with:
          name: scan-code-report
          path: reports/security/

  build-docker-image:
    name: Build Docker image
    runs-on: ubuntu-24.04
    needs: [run-tests, run-linter, run-security-scan]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Image owner (GHCR exige des noms en minuscules)
        run: |
          echo "IMAGE_OWNER_LOWER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Build backend image
        run: docker build -t "${{ env.REGISTRY }}/${{ env.IMAGE_OWNER_LOWER }}/meteo-backend:${{ env.IMAGE_TAG }}" backend

      - name: Build frontend image
        run: docker build -t "${{ env.REGISTRY }}/${{ env.IMAGE_OWNER_LOWER }}/meteo-frontend:${{ env.IMAGE_TAG }}" frontend

  push-to-registry:
    name: Push to registry (main only)
    runs-on: ubuntu-24.04
    needs: build-docker-image
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Image owner (GHCR exige des noms en minuscules)
        run: |
          echo "IMAGE_OWNER_LOWER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build -t "${{ env.REGISTRY }}/${{ env.IMAGE_OWNER_LOWER }}/meteo-backend:${{ env.IMAGE_TAG }}" backend
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_OWNER_LOWER }}/meteo-backend:${{ env.IMAGE_TAG }}"

      - name: Build and push frontend image
        run: |
          docker build -t "${{ env.REGISTRY }}/${{ env.IMAGE_OWNER_LOWER }}/meteo-frontend:${{ env.IMAGE_TAG }}" frontend
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_OWNER_LOWER }}/meteo-frontend:${{ env.IMAGE_TAG }}"
